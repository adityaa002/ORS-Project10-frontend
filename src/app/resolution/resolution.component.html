<div align="center">
    <h1 *ngIf="!form.data.id" align="center" style="margin-bottom: 5px; color: navy">Add Resolution</h1>
    <h1 *ngIf="form.data.id > 0" align="center" style="margin-bottom: 5px; color: navy">Update Resolution</h1>


    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{ form.message }}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{ form.message }}</h3>
    </div>

    <table>
        <tr>
            <th align="left">Resolution Id:<span style="color: red">*</span></th>
            <td align="center"><input type="text" name="resolutionId" [(ngModel)]="form.data.resolutionId"
                    placeholder="Enter resolution Id"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.resolutionId}}</td>
        </tr>

        <tr>
            <th align="left">
               Resolution Code<span style="color: red">*</span>
            </th>
                <td align="center"><input type="text" name="resolutionCode" [(ngModel)]="form.data.resolutionCode"
                    placeholder="Enter resolution code"></td>
             <td style="position: fixed; color: red;">{{form.inputerror.resolutionCode}}</td>
        </tr>

        <tr>
            <th align="left">Resolved By:<span style="color: red">*</span></th>
            <td align="center"><input type="text" name="resolutionId" [(ngModel)]="form.data.resolvedBy"
                    placeholder="Enter resolvedby"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.resolvedBy}}</td>
        </tr>


        <tr>
            <th align="left">Status:<span style="color: red">*</span></th>
            <td align="center"><input type="text" name="status" [(ngModel)]="form.data.status"
                    placeholder="Enter status Id"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.status}}</td>
        </tr>



        <tr></tr>

        <tr>
            <th></th>
            <td align="left" colspan="2">
                <button (click)="submit()">save</button> &nbsp;
                <button (click)="reset()">reset</button>
            </td>
        </tr>
    </table>
</div>
