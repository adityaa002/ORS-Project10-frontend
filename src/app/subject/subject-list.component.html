<div align="center">
    <h1 align="center" style="margin-bottom: 5px; color: navy; ">Subject List</h1>

   <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{ form.message }}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{ form.message }}</h3>
    </div>
     
   <table style="width: 100%">
            <tr>
                <td align="center">
                   <label><b>Course Name: </b></label>
                <select name="id" [(ngModel)]="form.searchParams.courseId" style="width: 165px;">
                    <option value="undefined">------------Select------------</option>
                    <option *ngFor="let obj of form.preload.courseList" [value]="obj.key">{{obj.value}}</option>
                </select>&nbsp;
                    <button (click)="search()">search</button>&nbsp;
                    <button (click)="reset()">reset</button>
                </td>
            </tr>
        </table>



    <br>    

    <table border="1" style="width: 100%; border: groove;">
        <tr style="background-color: #ECE8E5">
                <th><input type="checkbox" [(ngModel)]="isMasterSel" (change)="checkUncheckAll($event)" /></th>
            <th>S.No</th>
            <th>Subject</th>
            <th>Description</th>
            <th>Course</th>
            <th>Edit</th>
        </tr>

        <tr align="center" *ngFor="let m of form.list; let i = index">
                <td><input type="checkbox" #checkboxes (change)="checklistUpdate()" [id]="m.id" ></td>
             <td>{{(form.pageNo*5)+i+ 1}}</td>
            <td>{{m.name}}</td>
            <td>{{m.description}}</td>
            <td>{{m.courseName}}</td>
                <td><a (click)="forward( '/subject/' +  m.id)" style="cursor: pointer;">Edit</a></td>
        </tr>
    </table>
    <br>

    <table style="width: 100%">
        <tr>
            <td style="width: 25%"><button (click)="previous()" [disabled]="form.pageNo == 0">previous</button></td>
            <td align="center" style="width: 25%"><button (click)="forward('/subject')">new</button></td>
                <td align="center" style="width: 25%"><button (click)="deleteMany()">delete</button></td>
            <td style="width: 25%" align="right"><button (click)="next()"
                    [disabled]="form.nextListSize == 0">next</button></td>
        </tr>
    </table>
</div>
