<div class="role-bg">  <div class="container-fluid mt-5 pt-4">

    <h2 class="text-center mb-3" style="color: white;">Subject List</h2>

    <!-- Messages -->
    <div class="text-center mb-3">

      <div *ngIf="!form.error && form.message"
           class="alert alert-success alert-dismissible fade show d-inline-block">
        {{ form.message }}
        <button type="button" class="btn-close"
                (click)="form.message=''"></button>
      </div>

      <div *ngIf="form.error && form.message"
           class="alert alert-danger alert-dismissible fade show d-inline-block">
        {{ form.message }}
        <button type="button" class="btn-close"
                (click)="form.message=''"></button>
      </div>

    </div>

    <div *ngIf="form.list.length > 0">

      <!-- Search -->
      <div class="row justify-content-center mb-3">

        <div class="col-md-3">

          <label style="color: white;"><b>Course Name:</b></label>

          <select class="form-control form-control-sm"
                  [(ngModel)]="form.searchParams.id">

            <option value="">Select Course</option>

            <option *ngFor="let obj of form.preload.courseList"
                    [value]="obj.key">
              {{obj.value}}
            </option>

          </select>

        </div>

        <div class="col-md-3 text-center" style="margin-top: 22px;">

          <button class="btn btn-primary btn-sm me-2"
                  (click)="search()">
            Search
          </button>

          <button class="btn btn-dark btn-sm"
                  (click)="reset()">
            Reset
          </button>

        </div>

      </div>

      <!-- Table -->
      <div class="table-responsive">

        <table class="table table-bordered table-hover text-center align-middle">

          <thead class="table-secondary">

            <tr>
              <th>
                <input type="checkbox"
                       [(ngModel)]="isMasterSel"
                       (change)="checkUncheckAll($event)" />
              </th>
              <th>S.No</th>
              <th>Subject</th>
              <th>Description</th>
              <th>Course</th>
              <th>Edit</th>
            </tr>

          </thead>

          <tbody>

            <tr *ngFor="let m of form.list; let i = index">

              <td>
                <input type="checkbox"
                       #checkboxes
                       (change)="checklistUpdate()"
                       [id]="m.id">
              </td>

              <td>{{(form.pageNo*5)+i+1}}</td>
              <td>{{m.name}}</td>
              <td>{{m.description}}</td>
              <td>{{m.courseName}}</td>

              <td>
                <button class="btn btn-info btn-sm text-white"
                        (click)="forward('/subject/' + m.id)">
                  Edit
                </button>
              </td>

            </tr>

          </tbody>

        </table>

      </div>

      <!-- Buttons -->
      <div class="row mt-3">

        <div class="col-md-3">
          <button class="btn btn-warning btn-sm"
                  (click)="previous()"
                  [disabled]="form.pageNo == 0">
            Previous
          </button>
        </div>

        <div class="col-md-3 text-center">
          <button class="btn btn-primary btn-sm"
                  (click)="forward('/subject')">
            New
          </button>
        </div>

        <div class="col-md-3 text-center">
          <button class="btn btn-danger btn-sm"
                  (click)="deleteMany()">
            Delete
          </button>
        </div>

        <div class="col-md-3 text-end">
          <button class="btn btn-warning btn-sm"
                  (click)="next()"
                  [disabled]="form.nextListSize == 0">
            Next
          </button>
        </div>

      </div>

    </div>

    <!-- No Data -->
    <div *ngIf="form.list.length == 0" class="text-center mt-4">
      <button class="btn btn-primary btn-sm" (click)="reset()">Back</button>
    </div>

  </div>
</div>
