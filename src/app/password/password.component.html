<div class="role-bg d-flex justify-content-center align-items-center">

  <div class="card shadow-lg p-4 role-card">

    <!-- Header -->
    <h3 class="text-center text-primary mb-3">

      <span *ngIf="!form.data.id">
        {{ 'PasswordForm.AddPassword' | translate }}
      </span>

      <span *ngIf="form.data.id > 0">
        {{ 'PasswordForm.UpdatePassword' | translate }}
      </span>

    </h3>

    <!-- Message -->
    <div *ngIf="form.message"
         class="alert text-center"
         [ngClass]="form.error ? 'alert-danger' : 'alert-success'">

      {{ form.message }}

    </div>

    <!-- Password Code -->
    <div class="mb-3">

      <label class="form-label">
        {{ 'PasswordForm.PasswordCode' | translate }}
        <span class="text-danger">*</span>
      </label>

      <input type="text"
             class="form-control form-control-lg"
             name="passwordCode"
             [(ngModel)]="form.data.passwordCode"
             [placeholder]="'PasswordForm.Placeholders.PasswordCode' | translate">

      <small class="text-danger"
             *ngIf="form.inputerror.passwordCode">

        {{form.inputerror.passwordCode}}

      </small>

    </div>

    <!-- User Name -->
    <div class="mb-3">

      <label class="form-label">
        {{ 'PasswordForm.UserName' | translate }}
        <span class="text-danger">*</span>
      </label>

      <input type="text"
             class="form-control form-control-lg"
             name="userName"
             [(ngModel)]="form.data.userName"
             [placeholder]="'PasswordForm.Placeholders.UserName' | translate">

      <small class="text-danger"
             *ngIf="form.inputerror.userName">

        {{form.inputerror.userName}}

      </small>

    </div>

    <!-- Password Value -->
    <div class="mb-3">

      <label class="form-label">
        {{ 'PasswordForm.PasswordValue' | translate }}
        <span class="text-danger">*</span>
      </label>

      <input type="password"
             class="form-control form-control-lg"
             name="passwordValue"
             [(ngModel)]="form.data.passwordValue"
             [placeholder]="'PasswordForm.Placeholders.PasswordValue' | translate">

      <small class="text-danger"
             *ngIf="form.inputerror.passwordValue">

        {{form.inputerror.passwordValue}}

      </small>

    </div>

    <!-- Status -->
    <div class="mb-3">

      <label class="form-label">
        {{ 'PasswordForm.Status' | translate }}
        <span class="text-danger">*</span>
      </label>

      <select class="form-control"
              name="status"
              [(ngModel)]="form.data.status">

        <option value="">
          {{ 'PasswordForm.StatusOptions.Select' | translate }}
        </option>

        <option value="ACTIVE">
          {{ 'PasswordForm.StatusOptions.Active' | translate }}
        </option>

        <option value="INACTIVE">
          {{ 'PasswordForm.StatusOptions.Inactive' | translate }}
        </option>

      </select>

      <small class="text-danger"
             *ngIf="form.inputerror.status">

        {{form.inputerror.status}}

      </small>

    </div>

    <!-- Buttons -->
    <div class="text-center mt-4">

      <button class="btn btn-success px-4 me-2"
              (click)="submit()">

        {{ 'PasswordForm.Buttons.Save' | translate }}

      </button>

      <button class="btn btn-warning px-4"
              (click)="reset()">

        {{ 'PasswordForm.Buttons.Reset' | translate }}

      </button>

    </div>

  </div>

</div>
