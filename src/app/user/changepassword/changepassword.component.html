<div style="background: linear-gradient(rgba(5, 83, 77, 0.355), rgb(97, 229, 202)),
            url('assets/image/changePass.jpg') center/cover no-repeat;
            min-height: 100vh;
            padding-top: 80px;">

  <div class="container d-flex justify-content-center">
    <div class="card shadow-lg p-4" style="width: 400px; border-radius: 12px;">

      <h3 class="text-center text-primary mb-3"><b>Change Password</b></h3>

      <!-- Alerts -->
      <div class="text-center">
        <div *ngIf="!form1.error && form1.message"
             class="alert alert-success alert-dismissible fade show">
          {{ form1.message }}
          <button type="button" class="btn-close" (click)="form1.message=''"></button>
        </div>

        <div *ngIf="form1.error && form1.message"
             class="alert alert-danger alert-dismissible fade show">
          {{ form1.message }}
          <button type="button" class="btn-close" (click)="form1.message=''"></button>
        </div>
      </div>

      <!-- Form -->
      <form>

        <div class="mb-3">
          <label>Old Password *</label>
          <input type="password"
                 class="form-control form-control-sm"
                 [(ngModel)]="form1.data.oldPassword"
                 name="oldPassword"
                 placeholder="Enter Old Password">
          <small class="text-danger">{{ form1.inputerror.oldPassword }}</small>
        </div>

        <div class="mb-3">
          <label>New Password *</label>
          <input type="password"
                 class="form-control form-control-sm"
                 [(ngModel)]="form1.data.newPassword"
                 name="newPassword"
                 placeholder="Enter New Password">
          <small class="text-danger">{{ form1.inputerror.newPassword }}</small>
        </div>

        <div class="mb-3">
          <label>Confirm Password *</label>
          <input type="password"
                 class="form-control form-control-sm"
                 [(ngModel)]="form1.data.confirmPassword"
                 name="confirmPassword"
                 placeholder="Enter Confirm Password">
          <small class="text-danger">{{ form1.inputerror.confirmPassword }}</small>
        </div>

        <!-- Button -->
        <div class="text-center">
          <button type="button"
                  class="btn btn-primary btn-sm"
                  (click)="changePassword()">
            Proceed
          </button>
        </div>

      </form>

    </div>
  </div>

</div>
