<div class="form-bg d-flex justify-content-center align-items-center">

  <div class="card shadow-lg p-4 form-card">

    <!-- Header -->
    <h3 class="text-center text-primary mb-3">
      <span *ngIf="!form.data.id">Add College</span>
      <span *ngIf="form.data.id > 0">Update College</span>
    </h3>

    <!-- Message -->
    <div *ngIf="form.message"
         class="alert text-center"
         [ngClass]="form.error ? 'alert-danger' : 'alert-success'">
      {{ form.message }}
    </div>

    <!-- Name -->
    <div class="mb-3">
      <label class="form-label">
        Name <span class="text-danger">*</span>
      </label>
      <input type="text"
             class="form-control"
             name="name"
             [(ngModel)]="form.data.name"
             placeholder="Enter College Name">
      <small class="text-danger" *ngIf="form.inputerror.name">
        {{form.inputerror.name}}
      </small>
    </div>

    <!-- Address -->
    <div class="mb-3">
      <label class="form-label">
        Address <span class="text-danger">*</span>
      </label>
      <input type="text"
             class="form-control"
             name="address"
             [(ngModel)]="form.data.address"
             placeholder="Enter Address">
      <small class="text-danger" *ngIf="form.inputerror.address">
        {{form.inputerror.address}}
      </small>
    </div>

    <!-- State -->
    <div class="mb-3">
      <label class="form-label">
        State <span class="text-danger">*</span>
      </label>
      <input type="text"
             class="form-control"
             name="state"
             [(ngModel)]="form.data.state"
             placeholder="Enter State">
      <small class="text-danger" *ngIf="form.inputerror.state">
        {{form.inputerror.state}}
      </small>
    </div>

    <!-- City -->
    <div class="mb-3">
      <label class="form-label">
        City <span class="text-danger">*</span>
      </label>
      <input type="text"
             class="form-control"
             name="city"
             [(ngModel)]="form.data.city"
             placeholder="Enter City">
      <small class="text-danger" *ngIf="form.inputerror.city">
        {{form.inputerror.city}}
      </small>
    </div>

    <!-- Phone -->
    <div class="mb-3">
      <label class="form-label">
        Phone No <span class="text-danger">*</span>
      </label>
      <input type="text"
             class="form-control"
             name="phoneNo"
             maxlength="10"
             [(ngModel)]="form.data.phoneNo"
             placeholder="Enter Phone No">
      <small class="text-danger" *ngIf="form.inputerror.phoneNo">
        {{form.inputerror.phoneNo}}
      </small>
    </div>

    <!-- Buttons -->
    <div class="text-center mt-4">
      <button class="btn btn-success px-4 me-2" (click)="submit()">
        Save
      </button>

      <button class="btn btn-primary px-4" (click)="forward('/collegelist')">
        List
      </button>
    </div>

  </div>

</div>
