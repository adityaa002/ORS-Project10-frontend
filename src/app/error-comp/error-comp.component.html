<div class="container-fluid vh-100 d-flex align-items-center justify-content-center"
     style="background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)),
            url('assets/image/userList.jpg') center/cover no-repeat;">

  <div class="card shadow-lg text-center p-4" style="max-width: 500px; border-radius: 12px;">

    <!-- Icon -->
    <div class="mb-3">
      <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 50px;"></i>
    </div>

    <!-- Title -->
    <h3 class="text-danger mb-2">Something went wrong</h3>

    <!-- Message -->
    <p class="text-muted">
      {{message || 'Database service is currently unavailable. Please try again later.'}}
    </p>

    <!-- Buttons -->
    <div class="mt-3">
      <button class="btn btn-primary btn-sm me-2" (click)="reload()">
        Retry
      </button>

      <button class="btn btn-dark btn-sm" routerLink="/dashboard">
        Go Home
      </button>
    </div>

  </div>

</div>
