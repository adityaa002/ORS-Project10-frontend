<div class="container-fluid d-flex justify-content-center align-items-center"
     style="min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1562774053-701939374585?w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;">

  <!-- Dark overlay -->
  <div style="position:absolute; inset:0; background:rgba(10, 10, 30, 0.397); z-index:0;"></div>

  <div class="card shadow-lg p-4 position-relative"
       style="width:100%; max-width:420px; border-radius:16px; border:none;
              background:rgba(117, 115, 115, 0.679); backdrop-filter:blur(10px); z-index:1;">

    <div class="text-center mb-3">
       <h1 class="fw-bold mt-1" style="color:#0e0529; font-size:1.7rem;">Forget Password ?</h1>
      <p class="text" style="font-size:13px;">Enter your login ID to reset your password</p>
    </div>

    <!-- Success Alert -->
    <div *ngIf="!form.error && form.message"
         class="alert alert-success py-2 px-3 mb-3" role="alert">
      ✅ {{ form.message }}
    </div>

    <!-- Error Alert -->
    <div *ngIf="form.error && form.message"
         class="alert alert-danger py-2 px-3 mb-3" role="alert">
      ❌ {{ form.message }}
    </div>

    <table class="w-100">
      <tr>
        <th class="text-light py-2 pe-3" style="white-space:nowrap; font-size:13px;">
          Login Id<span class="text-danger">*</span>
        </th>
        <td class="py-2">
          <input type="email" name="loginId" [(ngModel)]="form.data.loginId"
                 placeholder="Enter Login ID"
                 class="form-control form-control-sm"
                 style="background:rgba(255, 255, 255, 0.08); border:1px solid rgba(255,255,255,0.2); color:#fff;">
          <small class="text-danger">{{form.inputerror.loginId}}</small>
        </td>
      </tr>

      <tr>
        <td></td>
        <td class="pt-3">
          <button (click)="submit()"
                  class="btn btn-primary btn-sm w-100">
            Go
          </button>
        </td>
      </tr>
    </table>

  </div>
</div>
